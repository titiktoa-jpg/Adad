<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Panel | RSP</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --bg: #F4F4F9; --card: #FFFFFF; --text: #1C1C1E; --primary: #000000; --border: #E5E5EA; }
        body { font-family: 'Prompt', sans-serif; background-color: var(--bg); color: var(--text); -webkit-tap-highlight-color: transparent; padding-bottom: 90px; }
        
        .card-ui { background-color: var(--card); border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.02); }
        .input-ui { background-color: #F9F9F9; border: 1.5px solid var(--border); border-radius: 14px; padding: 12px; width: 100%; transition: 0.2s; font-weight: 500; }
        .input-ui:focus { border-color: #007AFF; outline: none; background-color: #fff; }
        .btn-ui { background-color: var(--primary); color: white; border-radius: 14px; font-weight: 600; padding: 12px; width: 100%; transition: 0.2s; cursor: pointer; border: none; text-align: center; }
        .btn-ui:active { transform: scale(0.97); }
        
        /* Bottom Nav */
        .nav-btn { color: #8E8E93; transition: 0.3s; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 33.33%; padding: 10px 0; border-radius: 20px; position: relative; }
        .nav-btn.active { color: #007AFF; }
        .nav-btn.active i { transform: scale(1.15) translateY(-2px); }
        .nav-btn.active::after { content: ''; position: absolute; bottom: 2px; width: 4px; height: 4px; background: #007AFF; border-radius: 50%; }
        
        .tab-content { display: none; animation: fadeIn 0.3s ease-out; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Slider Range */
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 24px; width: 24px; border-radius: 50%; background: #007AFF; cursor: pointer; margin-top: -8px; box-shadow: 0 2px 6px rgba(0,122,255,0.4); }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 8px; cursor: pointer; background: #E5E5EA; border-radius: 4px; }
        
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #D1D1D6; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="auth-screen" class="min-h-screen flex items-center justify-center p-6 bg-gradient-to-tr from-gray-900 to-black">
        <div class="w-full max-w-sm card-ui p-8 text-center relative shadow-2xl bg-white">
            <div class="w-16 h-16 bg-red-500 text-white rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg"><i class="fas fa-user-shield text-3xl"></i></div>
            <h1 class="text-2xl font-black mb-1">แอดมิน <span class="text-red-500">SYSTEM</span></h1>
            <p class="text-gray-500 text-xs mb-6">เข้าสู่ระบบหลังบ้าน (Admin Only)</p>
            <div class="space-y-4">
                <input type="email" id="a-email" placeholder="อีเมลแอดมิน" class="input-ui text-center">
                <input type="password" id="a-pass" placeholder="รหัสผ่าน" class="input-ui text-center">
                <button onclick="loginAdmin()" class="btn-ui bg-red-600 shadow-[0_4px_15px_rgba(220,38,38,0.3)]">เข้าสู่ระบบแอดมิน</button>
            </div>
        </div>
    </div>

    <div id="app-screen" class="hidden max-w-md mx-auto pt-6 px-4">
        
        <div class="flex justify-between items-center mb-6 bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-red-500 text-white rounded-xl flex items-center justify-center text-lg font-bold"><i class="fas fa-crown"></i></div>
                <div>
                    <h2 class="text-sm font-black text-black leading-tight">Admin Dashboard</h2>
                    <p class="text-[10px] text-gray-500 font-bold uppercase tracking-wider">ระบบจัดการข้อมูล</p>
                </div>
            </div>
            <button onclick="logoutAdmin()" class="w-8 h-8 bg-gray-100 rounded-full flex items-center justify-center text-red-500 active:bg-gray-200"><i class="fas fa-power-off text-sm"></i></button>
        </div>

        <div id="tab-users" class="tab-content active">
            <div class="flex justify-between items-center mb-3">
                <h3 class="font-bold text-black text-sm"><i class="fas fa-users text-blue-500 mr-1"></i> รายชื่อผู้เล่นทั้งหมด</h3>
                <span class="text-[10px] bg-blue-100 text-blue-600 px-2 py-1 rounded-md font-bold" id="total-users">0 ยูสเซอร์</span>
            </div>
            <input type="text" id="search-user" onkeyup="filterUsers()" placeholder="🔍 ค้นหาชื่อ หรือ อีเมล..." class="input-ui mb-4 text-sm !py-2.5">
            
            <div id="list-users" class="space-y-3 custom-scroll max-h-[65vh] overflow-y-auto pb-6">
                <p class="text-center text-sm text-gray-400 py-4">กำลังโหลด...</p>
            </div>
        </div>

        <div id="tab-trans" class="tab-content">
            <div class="flex justify-between items-center mb-3">
                <h3 class="font-bold text-black text-sm"><i class="fas fa-exchange-alt text-orange-500 mr-1"></i> รายการฝาก-ถอน (รอดำเนินการ)</h3>
            </div>
            <div id="list-pending" class="space-y-3 custom-scroll max-h-[70vh] overflow-y-auto pb-6">
                <p class="text-center text-sm text-gray-400 py-4">กำลังโหลด...</p>
            </div>
        </div>

        <div id="tab-settings" class="tab-content">
            <div class="card-ui p-5">
                <h3 class="font-bold text-black text-sm mb-4"><i class="fab fa-facebook text-blue-600 mr-1"></i> ตั้งค่าช่องทางติดต่อ</h3>
                <p class="text-xs text-gray-500 mb-2">ลิงก์นี้จะไปโผล่ที่ปุ่ม "ติดต่อแอดมิน" ในหน้าลูกค้า</p>
                <input type="text" id="fb-link" placeholder="เช่น https://m.me/yourpage" class="input-ui text-sm mb-4">
                <button onclick="saveSettings()" class="btn-ui bg-blue-600"><i class="fas fa-save mr-1"></i> บันทึกลิงก์ติดต่อ</button>
            </div>
        </div>

    </div>

    <nav id="nav-bar" class="hidden fixed bottom-4 left-1/2 -translate-x-1/2 w-[90%] max-w-[400px] bg-white/95 backdrop-blur-md border border-gray-100 rounded-[20px] flex items-center justify-between p-1 shadow-[0_10px_30px_rgba(0,0,0,0.08)] z-50">
        <button onclick="switchTab('users')" class="nav-btn active" id="btn-users">
            <i class="fas fa-user-cog text-xl mb-1"></i><span class="text-[9px] font-bold">ลูกค้า/เรทชนะ</span>
        </button>
        <button onclick="switchTab('trans')" class="nav-btn" id="btn-trans">
            <i class="fas fa-money-check-alt text-xl mb-1 relative">
                <span id="badge-pending" class="hidden absolute -top-1 -right-2 bg-red-500 text-white text-[8px] font-black px-1.5 rounded-full border border-white">0</span>
            </i>
            <span class="text-[9px] font-bold">ฝาก-ถอน</span>
        </button>
        <button onclick="switchTab('settings')" class="nav-btn" id="btn-settings">
            <i class="fas fa-cog text-xl mb-1"></i><span class="text-[9px] font-bold">ตั้งค่า</span>
        </button>
    </nav>

    <script>
        // --- 1. CONFIG ---
        const firebaseConfig = { apiKey: "AIzaSyDaeVJ1mUxjm1gG4GMTfZyqJsjImiISzPI", projectId: "gaga-1eb83" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();

        const Toast = Swal.mixin({ toast: true, position: 'top', showConfirmButton: false, timer: 2000, background: '#1A1A1A', color: '#FFF' });

        // --- 2. AUTH ---
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
                document.getElementById('nav-bar').classList.remove('hidden');
                loadUsers(); loadPendingTrans(); loadSettings();
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('app-screen').classList.add('hidden');
                document.getElementById('nav-bar').classList.add('hidden');
            }
        });

        async function loginAdmin() {
            const e = document.getElementById('a-email').value, p = document.getElementById('a-pass').value;
            if(!e || !p) return Toast.fire({ icon: 'warning', title: 'กรอกข้อมูลให้ครบ' });
            Swal.showLoading();
            try { await auth.signInWithEmailAndPassword(e, p); Swal.close(); } 
            catch(err) { Swal.fire({ icon: 'error', title: 'เข้าสู่ระบบล้มเหลว', text: 'เฉพาะแอดมินเท่านั้น' }); }
        }
        function logoutAdmin() { auth.signOut(); }

        // --- 3. TAB MANAGEMENT ---
        function switchTab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-'+t).classList.add('active');
            document.getElementById('btn-'+t).classList.add('active');
        }

        // --- 4. USERS & WIN RATE (ล็อคเรท) ---
        let allUsers = [];
        function loadUsers() {
            db.collection('users').orderBy('createdAt', 'desc').onSnapshot(snap => {
                allUsers = [];
                snap.forEach(doc => allUsers.push({ id: doc.id, ...doc.data() }));
                document.getElementById('total-users').innerText = `${allUsers.length} ยูสเซอร์`;
                renderUsers(allUsers);
            });
        }

        function renderUsers(users) {
            const list = document.getElementById('list-users');
            if (users.length === 0) return list.innerHTML = '<p class="text-center text-xs text-gray-400">ไม่พบข้อมูล</p>';
            let html = '';
            users.forEach(u => {
                const bal = (u.balance || 0).toLocaleString();
                const rate = u.winRate || 35;
                html += `
                    <div class="card-ui p-4 bg-white border border-gray-50 flex justify-between items-center hover:shadow-md transition">
                        <div class="overflow-hidden">
                            <h4 class="font-black text-black text-sm truncate w-32">${u.name || 'No Name'}</h4>
                            <p class="text-[10px] text-gray-400 truncate w-32">${u.email}</p>
                        </div>
                        <div class="text-right flex flex-col items-end gap-1">
                            <span class="text-blue-600 font-black text-sm">฿ ${bal}</span>
                            <span class="text-[9px] bg-gray-100 text-gray-600 px-2 py-0.5 rounded font-bold">เรทชนะ: ${rate}%</span>
                            <button onclick="manageUser('${u.id}', '${u.name}', ${u.balance}, ${rate})" class="mt-1 text-[10px] bg-black text-white px-3 py-1.5 rounded-lg font-bold active:scale-95 transition"><i class="fas fa-sliders-h"></i> จัดการ</button>
                        </div>
                    </div>`;
            });
            list.innerHTML = html;
        }

        function filterUsers() {
            const txt = document.getElementById('search-user').value.toLowerCase();
            const filtered = allUsers.filter(u => (u.name && u.name.toLowerCase().includes(txt)) || (u.email && u.email.toLowerCase().includes(txt)));
            renderUsers(filtered);
        }

        // เปิด Modal จัดการ (อัปเดต Win Rate และ Balance)
        function manageUser(uid, name, balance, currentRate) {
            Swal.fire({
                title: `<span class="text-lg font-black">จัดการยูสเซอร์</span>`,
                html: `
                    <div class="text-left mt-2 mb-4">
                        <p class="text-xs text-gray-500 font-bold mb-1">ชื่อลูกค้า: <span class="text-black">${name}</span></p>
                        <p class="text-xs text-gray-500 font-bold">ยอดเงินปัจจุบัน: <span class="text-blue-600 font-black">฿ ${balance.toLocaleString()}</span></p>
                    </div>
                    
                    <hr class="border-gray-100 mb-4">
                    
                    <div class="text-left mb-6 bg-blue-50 p-4 rounded-xl border border-blue-100">
                        <label class="text-xs font-black text-blue-800 flex justify-between">
                            <span>ปรับเรทชนะ (Win Rate)</span>
                            <span id="rate-display" class="bg-white px-2 rounded border border-blue-200">${currentRate}%</span>
                        </label>
                        <input type="range" id="swal-rate" min="0" max="100" value="${currentRate}" class="w-full mt-3" oninput="document.getElementById('rate-display').innerText = this.value + '%'">
                        <p class="text-[9px] text-gray-500 mt-2">* 0 = แพ้รวด / 100 = ชนะรวด (ค่านี้ล็อคใช้งานทันทีเมื่อกดบันทึก)</p>
                    </div>

                    <div class="text-left">
                        <label class="text-xs font-black text-gray-700">ปรับยอดเงิน (บวก/ลบ)</label>
                        <div class="flex gap-2 mt-2">
                            <select id="swal-action" class="input-ui !w-1/3 !py-2 !text-sm">
                                <option value="add">เพิ่ม (+)</option>
                                <option value="deduct">ลบ (-)</option>
                            </select>
                            <input type="number" id="swal-amt" placeholder="จำนวนเงิน" class="input-ui !w-2/3 !py-2 !text-sm">
                        </div>
                        <p class="text-[9px] text-gray-400 mt-1">* หากต้องการแค่ปรับเรท ไม่ต้องกรอกช่องนี้</p>
                    </div>
                `,
                showCancelButton: true,
                confirmButtonText: '<i class="fas fa-lock"></i> บันทึกและล็อคเรท',
                cancelButtonText: 'ยกเลิก',
                customClass: { confirmButton: 'btn-ui bg-black text-white py-3', cancelButton: 'btn-ui bg-gray-200 text-black py-3 mt-2', popup: 'rounded-[24px]' },
                buttonsStyling: false,
                preConfirm: () => {
                    return {
                        newRate: parseInt(document.getElementById('swal-rate').value),
                        action: document.getElementById('swal-action').value,
                        amt: parseInt(document.getElementById('swal-amt').value) || 0
                    }
                }
            }).then(async (res) => {
                if(res.isConfirmed) {
                    const data = res.value;
                    try {
                        Swal.showLoading();
                        const updates = { winRate: data.newRate }; // ล็อคเรทชนะทันที 0-100
                        
                        let finalAmt = data.amt;
                        if (finalAmt > 0) {
                            // อัปเดตยอดเงิน
                            if (data.action === 'deduct') {
                                if (finalAmt > balance) finalAmt = balance; // ลบไม่เกินยอดที่มี
                                updates.balance = firebase.firestore.FieldValue.increment(-finalAmt);
                            } else {
                                updates.balance = firebase.firestore.FieldValue.increment(finalAmt);
                            }

                            // **เพิ่มประวัติให้ลูกค้า (Sync ตามคำขอที่แล้ว)**
                            await db.collection('transactions').add({
                                uid: uid, name: name,
                                amount: data.action === 'add' ? finalAmt : -finalAmt,
                                details: 'แอดมินปรับยอดหลังบ้าน',
                                status: 'approved', type: 'adjustment',
                                localTime: Date.now(), dateStr: new Date().toLocaleString('th-TH')
                            });
                        }

                        // บันทึกรวดเดียว
                        await db.collection('users').doc(uid).update(updates);
                        
                        Toast.fire({ icon: 'success', title: 'อัปเดตข้อมูลสำเร็จ ล็อคเรทแล้ว!' });
                    } catch(e) { Swal.fire('Error', e.message, 'error'); }
                }
            });
        }

        // --- 5. TRANSACTIONS (ฝาก-ถอน) ---
        function loadPendingTrans() {
            db.collection('transactions').where('status', '==', 'pending').orderBy('localTime', 'desc')
            .onSnapshot(snap => {
                const list = document.getElementById('list-pending');
                const badge = document.getElementById('badge-pending');
                
                if(snap.empty) {
                    badge.classList.add('hidden');
                    return list.innerHTML = '<p class="text-center text-xs text-gray-400 py-6"><i class="fas fa-check-circle text-2xl text-green-200 block mb-2"></i>ไม่มีรายการค้าง</p>';
                }

                badge.classList.remove('hidden');
                badge.innerText = snap.size;
                
                let html = '';
                snap.forEach(doc => {
                    const d = doc.data();
                    const isDep = d.type === 'deposit';
                    const iconColor = isDep ? 'text-green-500 bg-green-50' : 'text-red-500 bg-red-50';
                    const icon = isDep ? 'fa-arrow-down' : 'fa-arrow-up';
                    
                    html += `
                        <div class="card-ui p-4 bg-white border border-gray-100 shadow-sm">
                            <div class="flex justify-between items-start mb-3 border-b border-gray-50 pb-2">
                                <div class="flex items-center gap-3">
                                    <div class="w-10 h-10 rounded-xl flex items-center justify-center text-lg ${iconColor}"><i class="fas ${icon}"></i></div>
                                    <div>
                                        <h4 class="font-black text-black text-sm">${isDep ? 'แจ้งฝาก' : 'แจ้งถอน'} • ฿${d.amount.toLocaleString()}</h4>
                                        <p class="text-[10px] text-gray-400">${d.name}</p>
                                    </div>
                                </div>
                                <span class="text-[9px] text-gray-400">${d.dateStr.split(' ')[1]}</span>
                            </div>
                            <div class="bg-[#F9F9F9] p-2 rounded-lg mb-3">
                                <p class="text-[10px] text-gray-600 font-mono">${d.details}</p>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="processTrans('${doc.id}', '${d.uid}', ${d.amount}, 'approved', '${d.type}')" class="flex-1 bg-black text-white text-xs font-bold py-2 rounded-lg active:scale-95 transition"><i class="fas fa-check mr-1"></i> อนุมัติ</button>
                                <button onclick="processTrans('${doc.id}', '${d.uid}', ${d.amount}, 'rejected', '${d.type}')" class="flex-1 bg-red-100 text-red-600 text-xs font-bold py-2 rounded-lg active:scale-95 transition">ปฏิเสธ</button>
                            </div>
                        </div>`;
                });
                list.innerHTML = html;
            });
        }

        async function processTrans(docId, uid, amount, action, type) {
            Swal.fire({
                title: action === 'approved' ? 'ยืนยันอนุมัติ?' : 'ปฏิเสธรายการ?',
                icon: action === 'approved' ? 'question' : 'warning',
                showCancelButton: true, confirmButtonText: 'ยืนยัน', cancelButtonText: 'ยกเลิก',
                customClass: { confirmButton: 'btn-ui bg-black text-white', cancelButton: 'btn-ui bg-gray-200 text-black mt-2' }, buttonsStyling: false
            }).then(async (res) => {
                if (res.isConfirmed) {
                    try {
                        Swal.showLoading();
                        // เปลี่ยนสถานะบิล
                        await db.collection('transactions').doc(docId).update({ status: action });
                        
                        // ถ้าแอดมินอนุมัติ "ฝากเงิน" ต้องเพิ่มยอดให้ลูกค้า 
                        // (ถ้าเป็น "ถอน" หักยอดไปตั้งแต่ลูกค้ากดแล้ว ไม่ต้องทำอะไรเพิ่ม, แต่ถ้า "ปฏิเสธถอน" ต้องคืนเงินลูกค้า)
                        if (action === 'approved' && type === 'deposit') {
                            await db.collection('users').doc(uid).update({ balance: firebase.firestore.FieldValue.increment(amount) });
                        } else if (action === 'rejected' && type === 'withdraw') {
                            await db.collection('users').doc(uid).update({ balance: firebase.firestore.FieldValue.increment(amount) });
                        }
                        
                        Toast.fire({ icon: 'success', title: 'ทำรายการสำเร็จ' });
                    } catch (e) { Swal.fire('Error', e.message, 'error'); }
                }
            });
        }

        // --- 6. SETTINGS (ตั้งค่าลิ้งก์) ---
        function loadSettings() {
            db.collection('settings').doc('contact').get().then(doc => {
                if (doc.exists) document.getElementById('fb-link').value = doc.data().facebookUrl || '';
            });
        }

        async function saveSettings() {
            const url = document.getElementById('fb-link').value.trim();
            try {
                await db.collection('settings').doc('contact').set({ facebookUrl: url }, { merge: true });
                Toast.fire({ icon: 'success', title: 'บันทึกสำเร็จ ระบบฝั่งลูกค้าจะอัปเดตทันที' });
            } catch (e) { Swal.fire('Error', 'ไม่สามารถบันทึกได้', 'error'); }
        }
    </script>
</body>
</html>
