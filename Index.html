<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSP SUPREME | Professional Admin Panel</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --primary: #0061ff; --secondary: #60a5fa; --dark: #0f172a; --light-bg: #f8fafc; }
        body { font-family: 'Prompt', sans-serif; background-color: var(--light-bg); color: var(--dark); overflow-x: hidden; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .sidebar { transition: all 0.3s; background: white; border-right: 1px solid #e2e8f0; }
        .nav-link { display: flex; align-items: center; gap: 12px; padding: 14px 20px; margin: 4px 12px; border-radius: 14px; color: #64748b; font-weight: 500; transition: 0.2s; cursor: pointer; }
        .nav-link:hover { background: #f1f5f9; color: var(--primary); }
        .nav-link.active { background: var(--primary); color: white; box-shadow: 0 10px 15px -3px rgba(0, 97, 255, 0.25); }
        .glass-card { background: white; border-radius: 24px; border: 1px solid rgba(226, 232, 240, 0.8); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02); }
        .stat-card-blue { background: linear-gradient(135deg, #0061ff 0%, #60a5fa 100%); color: white; }
        .table-container { width: 100%; border-collapse: separate; border-spacing: 0 12px; }
        .table-row { background: white; transition: 0.3s; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .table-td { padding: 18px 20px; border-top: 1px solid #f1f5f9; border-bottom: 1px solid #f1f5f9; }
        .table-td:first-child { border-left: 1px solid #f1f5f9; border-top-left-radius: 18px; border-bottom-left-radius: 18px; }
        .table-td:last-child { border-right: 1px solid #f1f5f9; border-top-right-radius: 18px; border-bottom-right-radius: 18px; }
        .status-badge { padding: 6px 14px; border-radius: 10px; font-size: 11px; font-weight: 700; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Login Overlay */
        #login-screen { position: fixed; inset: 0; z-index: 9999; background: #0f172a; display: flex; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body class="min-h-screen lg:flex">

    <div id="login-screen">
        <div class="bg-white w-full max-w-md rounded-[32px] p-10 shadow-2xl">
            <div class="text-center mb-8">
                <div class="w-20 h-20 bg-blue-600 rounded-3xl flex items-center justify-center text-white mx-auto mb-5 shadow-xl shadow-blue-200">
                    <i class="fas fa-user-shield text-3xl"></i>
                </div>
                <h2 class="text-2xl font-black text-slate-800">Admin Authentication</h2>
                <p class="text-slate-400 text-sm">ระบบจัดการหลังบ้าน RSP Supreme</p>
            </div>
            <div class="space-y-4">
                <input type="email" id="email" placeholder="Email Address" class="w-full p-4 bg-slate-50 border-none ring-1 ring-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
                <input type="password" id="password" placeholder="Password" class="w-full p-4 bg-slate-50 border-none ring-1 ring-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="handleLogin()" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl hover:bg-blue-700 transition shadow-lg shadow-blue-200">เข้าสู่ระบบ</button>
            </div>
        </div>
    </div>

    <aside id="main-sidebar" class="sidebar fixed inset-y-0 left-0 z-50 w-72 transform -translate-x-full lg:translate-x-0 lg:static hidden">
        <div class="p-8 flex items-center gap-4">
            <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-white shadow-xl shadow-blue-200">
                <i class="fas fa-shield-halved text-2xl"></i>
            </div>
            <div>
                <h1 class="text-xl font-extrabold tracking-tight">RSP <span class="text-blue-600">SUPREME</span></h1>
            </div>
        </div>
        <nav class="mt-4 flex-1">
            <div onclick="switchTab('dash')" class="nav-link active" id="btn-dash"><i class="fa-solid fa-house-chimney-window"></i> แผงควบคุมหลัก</div>
            <div onclick="switchTab('users')" class="nav-link" id="btn-users"><i class="fa-solid fa-users-gear"></i> จัดการสมาชิก</div>
            <div onclick="switchTab('wit')" class="nav-link relative" id="btn-wit">
                <i class="fa-solid fa-money-bill-transfer"></i> รายการธุรกรรม
                <span id="badge-wit-count" class="absolute right-4 top-1/2 -translate-y-1/2 bg-red-500 text-white text-[10px] px-2 py-0.5 rounded-full hidden">0</span>
            </div>
            <div onclick="switchTab('setting')" class="nav-link" id="btn-setting"><i class="fa-solid fa-gears"></i> ตั้งค่าระบบ</div>
        </nav>
        <div class="p-6 mt-auto">
            <button onclick="logout()" class="w-full flex items-center justify-center gap-2 bg-red-50 text-red-500 py-4 rounded-2xl font-bold text-sm hover:bg-red-500 hover:text-white transition-all">
                <i class="fa-solid fa-power-off"></i> ออกจากระบบ
            </button>
        </div>
    </aside>

    <main id="main-content" class="flex-1 overflow-y-auto h-screen p-4 lg:p-10 hidden">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-4">
            <div>
                <h2 id="page-title" class="text-3xl font-black text-slate-800">แผงควบคุมหลัก</h2>
                <p id="page-desc" class="text-slate-400 text-sm">ข้อมูลสรุปและสถานะปัจจุบันของระบบ</p>
            </div>
        </header>

        <div class="max-w-7xl mx-auto">
            <section id="tab-dash" class="tab-content active">
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-10">
                    <div class="glass-card p-6 stat-card-blue"><h3 class="text-4xl font-black mb-1" id="stat-total-users">0</h3><p class="text-blue-100 text-xs font-bold uppercase">สมาชิกทั้งหมด</p></div>
                    <div class="glass-card p-6"><h3 class="text-4xl font-black mb-1 text-slate-800">฿<span id="stat-total-bal">0.00</span></h3><p class="text-slate-400 text-xs font-bold uppercase">เครดิตรวม</p></div>
                    <div class="glass-card p-6"><h3 class="text-4xl font-black mb-1 text-orange-500" id="stat-pending-wit">0</h3><p class="text-slate-400 text-xs font-bold uppercase">รอถอนเงิน</p></div>
                    <div class="glass-card p-6"><h3 class="text-4xl font-black mb-1 text-slate-800">35%</h3><p class="text-slate-400 text-xs font-bold uppercase">Win Rate</p></div>
                </div>
            </section>

            <section id="tab-wit" class="tab-content">
                <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                    <div class="flex bg-white p-1.5 rounded-2xl shadow-sm border">
                        <button onclick="switchWitSubTab('pending')" id="sub-pending-btn" class="px-8 py-3 rounded-xl text-xs font-bold transition-all bg-blue-600 text-white shadow-lg shadow-blue-100">รายการรออนุมัติ</button>
                        <button onclick="switchWitSubTab('all')" id="sub-all-btn" class="px-8 py-3 rounded-xl text-xs font-bold transition-all text-slate-500 hover:bg-slate-50">ประวัติถอนทั้งหมด</button>
                    </div>
                    <div id="wit-filter-bar" class="hidden flex gap-3">
                        <input type="text" id="wit-search-name" oninput="renderTransactionTable()" placeholder="ชื่อลูกค้า" class="px-4 py-3 rounded-xl border text-xs outline-none focus:ring-2 focus:ring-blue-500">
                        <input type="date" id="wit-search-date" onchange="renderTransactionTable()" class="px-4 py-3 rounded-xl border text-xs outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>
                <div class="overflow-x-auto">
                    <table class="table-container">
                        <tbody id="transaction-table-body"></tbody>
                    </table>
                </div>
            </section>
            
            </div>
    </main>

    <script>
        // ✅ 1. CONFIG & AUTH
        const firebaseConfig = { apiKey: "AIzaSyDaeVJ1mUxjm1gG4GMTfZyqJsjImiISzPI", projectId: "gaga-1eb83" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore(), auth = firebase.auth();

        auth.onAuthStateChanged(user => {
            if (user) {
                db.collection('users').doc(user.uid).get().then(doc => {
                    if (doc.exists && doc.data().role === 'admin') {
                        document.getElementById('login-screen').classList.add('hidden');
                        document.getElementById('main-sidebar').classList.remove('hidden');
                        document.getElementById('main-content').classList.remove('hidden');
                        initRealtimeData();
                    } else {
                        Swal.fire('Error', 'คุณไม่มีสิทธิ์เข้าถึงหน้าแอดมิน', 'error').then(() => auth.signOut());
                    }
                });
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('main-sidebar').classList.add('hidden');
                document.getElementById('main-content').classList.add('hidden');
            }
        });

        async function handleLogin() {
            const e = document.getElementById('email').value, p = document.getElementById('password').value;
            try { await auth.signInWithEmailAndPassword(e, p); } catch(err) { Swal.fire('Login Failed', 'อีเมลหรือรหัสผ่านผิด', 'error'); }
        }

        // ✅ 2. DATA LOADERS (ดึงข้อมูลจากที่สั่งไว้)
        let users = [], transactions = [], currentTab = 'dash', witSubTab = 'pending';

        function initRealtimeData() {
            db.collection('users').onSnapshot(snap => { users = snap.docs.map(d => ({ id: d.id, ...d.data() })); updateStats(); });
            db.collection('transactions').onSnapshot(snap => { 
                transactions = snap.docs.map(d => ({ id: d.id, ...d.data() })); 
                transactions.sort((a,b) => (b.time || 0) - (a.time || 0));
                updateStats();
                renderTransactionTable();
            });
        }

        function updateStats() {
            document.getElementById('stat-total-users').innerText = users.length;
            document.getElementById('stat-total-bal').innerText = users.reduce((s, u) => s + (u.balance || 0), 0).toLocaleString();
            const p = transactions.filter(t => t.status === 'pending').length;
            document.getElementById('stat-pending-wit').innerText = p;
            const b = document.getElementById('badge-wit-count');
            if(p > 0) { b.innerText = p; b.classList.remove('hidden'); } else { b.classList.add('hidden'); }
        }

        function renderTransactionTable() {
            const nameSearch = document.getElementById('wit-search-name').value.toLowerCase();
            const dateSearch = document.getElementById('wit-search-date').value;
            let filtered = transactions;

            if(witSubTab === 'pending') {
                filtered = transactions.filter(t => t.status === 'pending');
            } else {
                if(nameSearch) filtered = filtered.filter(t => (t.name||"").toLowerCase().includes(nameSearch));
                if(dateSearch) {
                    const [y, m, d] = dateSearch.split('-');
                    const target = `${parseInt(d)}/${parseInt(m)}/${y}`;
                    filtered = filtered.filter(t => t.date.includes(target));
                }
            }

            let html = '';
            filtered.forEach(t => {
                const info = (t.details || "").split(" | ");
                html += `
                <tr class="table-row">
                    <td class="table-td font-bold text-slate-700">${t.name}</td>
                    <td class="table-td">
                        <div class="bg-slate-50 p-3 rounded-2xl border border-dashed text-xs">
                            <b class="text-blue-500">${info[0]||'BANK'}</b><br>
                            <span class="mono font-bold">${info[1]||'-'}</span>
                        </div>
                    </td>
                    <td class="table-td font-black">฿${(t.amt||0).toLocaleString()}</td>
                    <td class="table-td text-[10px] text-slate-400">${t.date}</td>
                    <td class="table-td text-center">
                        ${t.status === 'pending' ? `
                            <button onclick="approveTransaction('${t.id}')" class="bg-green-500 text-white px-4 py-2 rounded-xl text-[10px] font-bold">โอนแล้ว</button>
                        ` : `<span class="status-badge bg-slate-100 text-slate-500">${t.status}</span>`}
                    </td>
                </tr>`;
            });
            document.getElementById('transaction-table-body').innerHTML = html || '<tr><td class="text-center py-10 text-slate-400">ไม่พบข้อมูล</td></tr>';
        }

        async function approveTransaction(id) {
            const res = await Swal.fire({ title: 'ยืนยันการโอน?', text: 'คุณโอนเงินแล้วใช่หรือไม่', showCancelButton: true });
            if(res.isConfirmed) { await db.collection('transactions').doc(id).update({ status: 'approved' }); }
        }

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById('tab-'+id).classList.add('active');
            document.getElementById('btn-'+id).classList.add('active');
        }

        function switchWitSubTab(tab) {
            witSubTab = tab;
            const p = document.getElementById('sub-pending-btn'), a = document.getElementById('sub-all-btn'), f = document.getElementById('wit-filter-bar');
            if(tab === 'pending') {
                p.className = "px-8 py-3 rounded-xl text-xs font-bold bg-blue-600 text-white shadow-lg shadow-blue-100";
                a.className = "px-8 py-3 rounded-xl text-xs font-bold text-slate-500";
                f.classList.add('hidden');
            } else {
                a.className = "px-8 py-3 rounded-xl text-xs font-bold bg-blue-600 text-white shadow-lg shadow-blue-100";
                p.className = "px-8 py-3 rounded-xl text-xs font-bold text-slate-500";
                f.classList.remove('hidden');
            }
            renderTransactionTable();
        }

        function logout() { auth.signOut(); }
    </script>
</body>
</html>
