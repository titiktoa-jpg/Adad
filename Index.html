<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSP | Master Admin</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #0b0f19; color: #e2e8f0; }
        .sidebar { background: #111827; border-right: 1px solid #1f2937; }
        .card-stat { background: #1e293b; border: 1px solid #334155; border-radius: 12px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .table-row:hover { background: rgba(255, 255, 255, 0.03); }
    </style>
</head>
<body class="min-h-screen flex overflow-hidden">

    <div id="login-overlay" class="fixed inset-0 z-[9999] bg-[#0b0f19] flex items-center justify-center p-4">
        <div class="bg-[#1e293b] w-full max-w-md p-8 rounded-2xl border border-slate-700 shadow-2xl">
            <div class="text-center mb-8">
                <i class="fas fa-shield-halved text-5xl text-amber-500 mb-4"></i>
                <h1 class="text-3xl font-black text-white">ADMIN LOGIN</h1>
            </div>
            <input type="email" id="adm-user" placeholder="Admin Email" class="w-full p-4 mb-4 bg-[#0b0f19] border border-slate-700 rounded-xl text-white outline-none focus:border-amber-500">
            <input type="password" id="adm-pass" placeholder="Password" class="w-full p-4 mb-6 bg-[#0b0f19] border border-slate-700 rounded-xl text-white outline-none focus:border-amber-500">
            <button onclick="handleLogin()" class="w-full bg-amber-500 text-slate-900 font-bold py-4 rounded-xl hover:bg-amber-400 transition text-lg">เข้าสู่ระบบ</button>
        </div>
    </div>

    <div class="sidebar w-64 hidden md:flex flex-col">
        <div class="p-6 text-center border-b border-slate-800">
            <h2 class="text-2xl font-black text-white">RSP<span class="text-amber-500">.</span>CONTROL</h2>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <button onclick="showTab('users')" class="nav-btn w-full flex items-center p-3 rounded-lg text-slate-400 hover:bg-slate-800 hover:text-white transition" id="btn-users">
                <i class="fas fa-users w-8"></i> ผู้ใช้งานทั้งหมด
            </button>
            <button onclick="showTab('withdraw')" class="nav-btn w-full flex items-center p-3 rounded-lg text-slate-400 hover:bg-slate-800 hover:text-white transition" id="btn-withdraw">
                <i class="fas fa-money-check-dollar w-8"></i> รายการถอนเงิน
            </button>
            <button onclick="showTab('settings')" class="nav-btn w-full flex items-center p-3 rounded-lg text-slate-400 hover:bg-slate-800 hover:text-white transition" id="btn-settings">
                <i class="fas fa-cog w-8"></i> ตั้งค่าระบบ
            </button>
        </nav>
        <button onclick="handleLogout()" class="p-4 text-red-400 hover:bg-red-500/10 flex items-center justify-center gap-2 border-t border-slate-800">
            <i class="fas fa-sign-out-alt"></i> ออกจากระบบ
        </button>
    </div>

    <main class="flex-1 overflow-y-auto p-4 md:p-10">
        
        <section id="users" class="tab-content active">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-bold"><i class="fas fa-users text-amber-500 mr-3"></i>จัดการผู้เล่น</h2>
                <div class="text-sm text-slate-400">จำนวนผู้เล่นทั้งหมด: <span id="user-count" class="text-white">0</span></div>
            </div>
            <div class="card-stat overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-800/50 text-slate-400 text-sm uppercase">
                        <tr>
                            <th class="p-4">ชื่อ / อีเมล</th>
                            <th class="p-4 text-center">เครดิต (฿)</th>
                            <th class="p-4 text-center">Win Rate (%)</th>
                            <th class="p-4 text-center">จัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="users-list"></tbody>
                </table>
            </div>
        </section>

        <section id="withdraw" class="tab-content">
            <h2 class="text-2xl font-bold mb-8"><i class="fas fa-hand-holding-dollar text-green-500 mr-3"></i>คำขอถอนเงิน</h2>
            <div class="grid gap-4" id="withdraw-list">
                <div class="text-center text-slate-500 py-10">ไม่มีคำขอที่ค้างอยู่</div>
            </div>
        </section>

        <section id="settings" class="tab-content">
            <h2 class="text-2xl font-bold mb-8"><i class="fas fa-cog text-blue-500 mr-3"></i>ตั้งค่าช่องทางติดต่อ</h2>
            <div class="card-stat p-8 max-w-2xl">
                <label class="block text-slate-400 mb-2">ลิ้งก์ Facebook (สำหรับลูกค้ากดปุ่มติดต่อแอดมิน)</label>
                <div class="flex gap-2">
                    <input type="text" id="fb-link" placeholder="https://facebook.com/yourpage" class="flex-1 p-4 bg-[#0b0f19] border border-slate-700 rounded-xl text-white outline-none">
                    <button onclick="saveSettings()" class="bg-blue-600 hover:bg-blue-500 px-8 rounded-xl font-bold transition">บันทึก</button>
                </div>
                <p class="text-xs text-slate-500 mt-4">* ลิ้งก์นี้จะไปแสดงที่หน้าเว็บลูกค้าทันทีเมื่อลูกค้ากดปุ่ม "ติดต่อแอดมิน"</p>
            </div>
        </section>

    </main>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDaeVJ1mUxjm1gG4GMTfZyqJsjImiISzPI", projectId: "gaga-1eb83" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // 🛡️ ตรวจสอบสิทธิ์ Admin
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const doc = await db.collection('users').doc(user.uid).get();
                if (doc.exists && doc.data().role === 'admin') {
                    document.getElementById('login-overlay').style.display = 'none';
                    initAdminData();
                } else {
                    Swal.fire('เข้าถึงไม่ได้', 'คุณไม่ใช่แอดมิน', 'error');
                    auth.signOut();
                }
            } else {
                document.getElementById('login-overlay').style.display = 'flex';
            }
        });

        function handleLogin() {
            const e = document.getElementById('adm-user').value;
            const p = document.getElementById('adm-pass').value;
            auth.signInWithEmailAndPassword(e, p).catch(err => Swal.fire('Error', 'ล็อกอินไม่สำเร็จ', 'error'));
        }
        
        function handleLogout() { auth.signOut(); }

        function showTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('bg-slate-800', 'text-white'));
            document.getElementById('btn-'+tab).classList.add('bg-slate-800', 'text-white');
        }

        // 🚀 โหลดข้อมูลทั้งหมด
        function initAdminData() {
            loadUsers();
            loadWithdrawals();
            loadSettings();
        }

        // 👥 ระบบจัดการสมาชิก
        function loadUsers() {
            db.collection('users').onSnapshot(snap => {
                document.getElementById('user-count').innerText = snap.size;
                let html = '';
                snap.forEach(doc => {
                    const u = doc.data();
                    html += `
                        <tr class="table-row border-b border-slate-800/50">
                            <td class="p-4">
                                <div class="font-bold text-white">${u.name || 'No Name'}</div>
                                <div class="text-xs text-slate-500">${u.email}</div>
                            </td>
                            <td class="p-4 text-center font-bold text-amber-500">${(u.balance || 0).toLocaleString()}</td>
                            <td class="p-4 text-center text-blue-400 font-bold">${u.winRate || 35}%</td>
                            <td class="p-4 text-center space-x-2">
                                <button onclick="editBalance('${doc.id}', '${u.name}')" class="p-2 bg-slate-700 hover:bg-green-600 rounded transition text-xs">เงิน</button>
                                <button onclick="editWinRate('${doc.id}', '${u.name}', ${u.winRate || 35})" class="p-2 bg-slate-700 hover:bg-blue-600 rounded transition text-xs">ชนะ</button>
                            </td>
                        </tr>`;
                });
                document.getElementById('users-list').innerHTML = html;
            });
        }

        async function editBalance(uid, name) {
            const { value: amt } = await Swal.fire({
                title: 'จัดการยอดเงิน: ' + name,
                input: 'number', inputLabel: 'ใส่จำนวน (ใส่เลขลบเพื่อหักเงิน เช่น -100)',
                showCancelButton: true, background: '#1e293b', color: '#fff'
            });
            if (amt) {
                db.collection('users').doc(uid).update({ balance: firebase.firestore.FieldValue.increment(Number(amt)) });
            }
        }

        async function editWinRate(uid, name, current) {
            const { value: rate } = await Swal.fire({
                title: 'ปรับโอกาสชนะ: ' + name,
                input: 'range', inputLabel: '0 - 100%',
                inputValue: current,
                showCancelButton: true, background: '#1e293b', color: '#fff'
            });
            if (rate) {
                db.collection('users').doc(uid).update({ winRate: Number(rate) });
            }
        }

        // 💸 ระบบจัดการถอนเงิน
        function loadWithdrawals() {
            db.collection('transactions').where('status', '==', 'pending').onSnapshot(snap => {
                const list = document.getElementById('withdraw-list');
                if (snap.empty) {
                    list.innerHTML = '<div class="text-center text-slate-500 py-10">ไม่มีคำขอที่ค้างอยู่</div>';
                    return;
                }
                let html = '';
                snap.forEach(doc => {
                    const w = doc.data();
                    html += `
                        <div class="card-stat p-6 flex flex-col md:flex-row justify-between items-center gap-4">
                            <div>
                                <div class="text-xs text-slate-500 mb-1">${w.dateStr}</div>
                                <div class="text-xl font-black text-amber-500">${w.amount.toLocaleString()} ฿</div>
                                <div class="text-white font-bold">${w.name}</div>
                                <div class="text-sm text-blue-300 font-mono">${w.bankAcc}</div>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="approve('${doc.id}')" class="bg-green-600 hover:bg-green-500 px-6 py-2 rounded-lg font-bold">อนุมัติ</button>
                                <button onclick="reject('${doc.id}', '${w.uid}', ${w.amount})" class="bg-red-600 hover:bg-red-500 px-6 py-2 rounded-lg font-bold">ยกเลิก/คืนเงิน</button>
                            </div>
                        </div>`;
                });
                list.innerHTML = html;
            });
        }

        function approve(id) {
            db.collection('transactions').doc(id).update({ status: 'approved' })
              .then(() => Swal.fire('สำเร็จ', 'อนุมัติเรียบร้อย', 'success'));
        }

        function reject(id, uid, amt) {
            db.collection('users').doc(uid).update({ balance: firebase.firestore.FieldValue.increment(amt) });
            db.collection('transactions').doc(id).update({ status: 'rejected' })
              .then(() => Swal.fire('ยกเลิก', 'คืนเงินให้ลูกค้าแล้ว', 'info'));
        }

        // ⚙️ ระบบตั้งค่า (Facebook Link)
        function loadSettings() {
            db.collection('settings').doc('contact').get().then(doc => {
                if(doc.exists) document.getElementById('fb-link').value = doc.data().facebookUrl || '';
            });
        }

        function saveSettings() {
            const url = document.getElementById('fb-link').value;
            db.collection('settings').doc('contact').set({ facebookUrl: url })
              .then(() => Swal.fire('สำเร็จ', 'อัปเดตช่องทางติดต่อแล้ว', 'success'));
        }

        showTab('users');
    </script>
</body>
</html>
