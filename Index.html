<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Admin - Reward System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;500;700&display=swap" rel="stylesheet">
    <style>body{font-family:'Sarabun',sans-serif; background:#f1f5f9;}</style>
</head>
<body class="flex h-screen text-slate-800">

    <div id="login-wall" class="fixed inset-0 bg-slate-900 z-50 flex items-center justify-center">
        <div class="bg-white p-8 rounded-lg shadow-xl w-96">
            <h2 class="text-2xl font-bold mb-4 text-slate-800">Admin Panel</h2>
            <input id="a-email" type="email" value="gaga@gmail.com" class="w-full border p-2 rounded mb-2 bg-slate-100" readonly>
            <input id="a-pass" type="password" placeholder="Password" class="w-full border p-2 rounded mb-4">
            <button onclick="doLogin()" class="w-full bg-slate-800 text-white py-2 rounded font-bold hover:bg-slate-700">Login</button>
        </div>
    </div>

    <aside class="w-64 bg-slate-800 text-white flex flex-col">
        <div class="p-6 text-xl font-bold border-b border-slate-700">📦 Item Manager</div>
        <nav class="flex-1 p-4 space-y-2">
            <button onclick="tab('req')" class="w-full text-left p-3 rounded hover:bg-slate-700">📩 คำขอรับของ</button>
            <button onclick="tab('items')" class="w-full text-left p-3 rounded hover:bg-slate-700">🎁 จัดการของรางวัล</button>
            <button onclick="tab('cats')" class="w-full text-left p-3 rounded hover:bg-slate-700">📁 จัดการหมวดหมู่</button>
        </nav>
        <button onclick="auth.signOut()" class="p-4 text-center text-red-400 hover:bg-slate-900">Logout</button>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto">
        
        <div id="tab-req" class="page-tab">
            <h2 class="text-2xl font-bold mb-6">รายการคำขอ (Pending)</h2>
            <div class="bg-white rounded-lg shadow overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-100 text-slate-500">
                        <tr>
                            <th class="p-4">เวลา</th>
                            <th class="p-4">User</th>
                            <th class="p-4">Item</th>
                            <th class="p-4">ข้อมูลที่ลูกค้ากรอก (Form Data)</th>
                            <th class="p-4 text-right">จัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="req-list" class="divide-y"></tbody>
                </table>
            </div>
        </div>

        <div id="tab-items" class="page-tab hidden">
            <div class="flex justify-between mb-6">
                <h2 class="text-2xl font-bold">รายการของรางวัล</h2>
                <button onclick="openItemModal()" class="bg-blue-600 text-white px-4 py-2 rounded shadow hover:bg-blue-700">+ เพิ่มไอเทม</button>
            </div>
            <div id="item-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </div>

        <div id="tab-cats" class="page-tab hidden">
            <div class="flex justify-between mb-6">
                <h2 class="text-2xl font-bold">หมวดหมู่เกม</h2>
                <button onclick="addCat()" class="bg-green-600 text-white px-4 py-2 rounded shadow hover:bg-green-700">+ เพิ่มหมวด</button>
            </div>
            <div id="cat-grid" class="space-y-2 max-w-lg"></div>
        </div>

    </main>

    <div id="item-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4">
        <div class="bg-white rounded-lg w-full max-w-lg p-6">
            <h3 class="text-xl font-bold mb-4">เพิ่ม/แก้ไข ไอเทม</h3>
            <div class="space-y-3">
                <input type="text" id="i-name" placeholder="ชื่อไอเทม" class="w-full border p-2 rounded">
                <input type="text" id="i-img" placeholder="URL รูปภาพ" class="w-full border p-2 rounded">
                <select id="i-cat" class="w-full border p-2 rounded"></select>
                
                <div class="bg-yellow-50 p-3 rounded border border-yellow-200">
                    <label class="font-bold text-sm block mb-1">ข้อมูลที่ลูกค้าต้องกรอก (สำคัญ)</label>
                    <input type="text" id="i-fields" placeholder="เช่น: UID, Server, ชื่อในเกม" class="w-full border p-2 rounded text-sm">
                    <p class="text-xs text-gray-500 mt-1">* คั่นด้วยลูกน้ำ (,) ระบบจะสร้างช่องกรอกให้ลูกค้าเอง</p>
                </div>

                <div class="flex justify-end gap-2 mt-4">
                    <button onclick="closeModal()" class="px-4 py-2 text-gray-500">ยกเลิก</button>
                    <button onclick="saveItem()" class="px-4 py-2 bg-blue-600 text-white rounded">บันทึก</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        const config = {
            apiKey: "AIzaSyABuBrdprpiN32ZD4cSCiSslkYbRfnWGgE",
            authDomain: "namba-fe57a.firebaseapp.com",
            databaseURL: "https://namba-fe57a-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "namba-fe57a",
            appId: "1:340416568750:web:bb0a58ee618978bc107c3f"
        };
        firebase.initializeApp(config);
        const auth = firebase.auth();
        const db = firebase.database();

        auth.onAuthStateChanged(u => {
            if(u && u.email === 'gaga@gmail.com') {
                document.getElementById('login-wall').classList.add('hidden');
                initAdmin();
            } else {
                document.getElementById('login-wall').classList.remove('hidden');
            }
        });

        const doLogin = () => auth.signInWithEmailAndPassword(document.getElementById('a-email').value, document.getElementById('a-pass').value);

        function initAdmin() {
            // Load Categories
            db.ref('categories').on('value', s => {
                const sel = document.getElementById('i-cat');
                const grid = document.getElementById('cat-grid');
                sel.innerHTML = ''; grid.innerHTML = '';
                
                s.forEach(c => {
                    sel.innerHTML += `<option value="${c.key}">${c.val().name}</option>`;
                    grid.innerHTML += `
                        <div class="flex justify-between bg-white p-3 rounded border">
                            <span>${c.val().name}</span>
                            <button onclick="db.ref('categories/${c.key}').remove()" class="text-red-500 text-sm">ลบ</button>
                        </div>
                    `;
                });
            });

            // Load Items
            db.ref('items').on('value', s => {
                const grid = document.getElementById('item-grid');
                grid.innerHTML = '';
                s.forEach(c => {
                    const i = c.val();
                    const fields = i.fields ? i.fields.join(', ') : '-';
                    grid.innerHTML += `
                        <div class="bg-white p-4 rounded shadow border-l-4 border-blue-500 relative">
                            <h3 class="font-bold">${i.name}</h3>
                            <p class="text-sm text-gray-500">Require: ${fields}</p>
                            <button onclick="db.ref('items/${c.key}').remove()" class="absolute top-2 right-2 text-red-500 hover:bg-red-50 p-1 rounded">ลบ</button>
                        </div>
                    `;
                });
            });

            // Load Pending Requests
            db.ref('requests').orderByChild('status').equalTo('pending').on('value', s => {
                const tbody = document.getElementById('req-list');
                tbody.innerHTML = '';
                if(!s.exists()) { tbody.innerHTML = '<tr><td colspan="5" class="p-4 text-center text-gray-400">ไม่มีคำขอใหม่</td></tr>'; return; }
                
                s.forEach(c => {
                    const r = c.val();
                    // Format Form Data JSON to HTML
                    let formHtml = '';
                    if(r.formData) {
                        formHtml = Object.entries(r.formData).map(([k, v]) => 
                            `<div class="text-xs"><span class="font-bold text-gray-600">${k}:</span> ${v}</div>`
                        ).join('');
                    }

                    tbody.innerHTML += `
                        <tr class="border-b hover:bg-slate-50">
                            <td class="p-4 text-xs text-gray-500">${new Date(r.timestamp).toLocaleString()}</td>
                            <td class="p-4 text-sm">${r.email}</td>
                            <td class="p-4 font-bold text-blue-600">${r.itemName}</td>
                            <td class="p-4 bg-yellow-50 rounded border border-yellow-100">${formHtml || '-'}</td>
                            <td class="p-4 text-right space-x-2">
                                <button onclick="setStatus('${c.key}', 'approved')" class="text-green-600 border border-green-600 px-2 py-1 rounded text-xs hover:bg-green-50">อนุมัติ</button>
                                <button onclick="setStatus('${c.key}', 'rejected')" class="text-red-600 border border-red-600 px-2 py-1 rounded text-xs hover:bg-red-50">ปฏิเสธ</button>
                            </td>
                        </tr>
                    `;
                });
            });
        }

        // Actions
        function addCat() {
            const name = prompt("ชื่อหมวดหมู่เกม:");
            if(name) db.ref('categories').push({ name });
        }

        function openItemModal() {
            document.getElementById('item-modal').classList.remove('hidden');
        }

        function saveItem() {
            const name = document.getElementById('i-name').value;
            const img = document.getElementById('i-img').value;
            const cat = document.getElementById('i-cat').value;
            const fieldStr = document.getElementById('i-fields').value;

            if(!name || !cat) return alert('กรุณากรอกข้อมูล');

            // แปลง string "UID, Server" -> Array ['UID', 'Server']
            const fields = fieldStr.split(',').map(s => s.trim()).filter(s => s !== '');

            db.ref('items').push({
                name, image: img, category: cat, fields
            });
            closeModal();
        }

        function setStatus(key, status) {
            if(confirm('ยืนยันสถานะ: ' + status)) {
                db.ref('requests/' + key).update({ status });
            }
        }

        function closeModal() { document.getElementById('item-modal').classList.add('hidden'); }
        function tab(t) {
            document.querySelectorAll('.page-tab').forEach(e => e.classList.add('hidden'));
            document.getElementById('tab-'+t).classList.remove('hidden');
        }
    </script>
</body>
</html>
