<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - Royal 9</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>body{font-family:'Kanit',sans-serif;background:#f3f4f6;}</style>
</head>
<body class="bg-gray-100 h-screen flex overflow-hidden">

    <div id="login-wall" class="fixed inset-0 bg-white z-50 flex flex-col items-center justify-center">
        <h1 class="text-2xl font-bold mb-4">ระบบหลังบ้าน (เฉพาะเจ้าหน้าที่)</h1>
        <div class="w-80 space-y-3">
            <input id="a-email" type="email" value="gaga@gmail.com" class="w-full border p-2 rounded" readonly>
            <input id="a-pass" type="password" placeholder="รหัสผ่านของคุณ" class="w-full border p-2 rounded">
            <button onclick="adminLogin()" class="w-full bg-black text-white py-2 rounded">เข้าสู่ระบบ</button>
        </div>
    </div>

    <aside class="w-64 bg-white border-r flex flex-col hidden md:flex">
        <div class="p-6 font-bold text-xl text-indigo-700">ROYAL ADMIN</div>
        <nav class="flex-1 p-4 space-y-2">
            <button onclick="setTab('users')" class="w-full text-left p-3 rounded hover:bg-indigo-50 text-indigo-900 font-medium">👥 สมาชิก (Users)</button>
            <button onclick="setTab('finance')" class="w-full text-left p-3 rounded hover:bg-indigo-50 text-indigo-900 font-medium">💰 ฝาก-ถอน (Finance)</button>
            <button onclick="setTab('settings')" class="w-full text-left p-3 rounded hover:bg-indigo-50 text-indigo-900 font-medium">⚙️ ตั้งค่า (Settings)</button>
        </nav>
        <div class="p-4 border-t">
            <div id="my-email" class="text-xs text-gray-500 mb-2">...</div>
            <button onclick="firebase.auth().signOut()" class="text-red-600 text-sm">ออกจากระบบ</button>
        </div>
    </aside>

    <main class="flex-1 overflow-y-auto p-8">
        
        <div id="tab-users" class="space-y-4">
            <h2 class="text-2xl font-bold mb-4">จัดการลูกค้า</h2>
            <div class="bg-white rounded shadow overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 border-b">
                        <tr>
                            <th class="p-4">Email</th>
                            <th class="p-4">Wallet</th>
                            <th class="p-4">Lock Status</th>
                            <th class="p-4 text-right">Action</th>
                        </tr>
                    </thead>
                    <tbody id="user-rows"></tbody>
                </table>
            </div>
        </div>

        <div id="tab-finance" class="hidden space-y-4">
            <h2 class="text-2xl font-bold mb-4">รายการรออนุมัติ</h2>
            <div id="txn-rows" class="grid gap-4"></div>
        </div>

        <div id="tab-settings" class="hidden space-y-4 max-w-xl">
            <h2 class="text-2xl font-bold mb-4">ตั้งค่าระบบ</h2>
            <div class="bg-white p-6 rounded shadow space-y-4">
                <div>
                    <label class="block text-sm font-bold mb-1">ประกาศตัววิ่ง</label>
                    <input id="s-announce" class="w-full border p-2 rounded">
                </div>
                <div>
                    <label class="block text-sm font-bold mb-1">ลิงก์ติดต่อ</label>
                    <input id="s-line" class="w-full border p-2 rounded">
                </div>
                <div>
                    <label class="block text-sm font-bold mb-1">ข้อมูลธนาคาร</label>
                    <textarea id="s-bank" class="w-full border p-2 rounded h-24"></textarea>
                </div>
                <button onclick="saveSys()" class="bg-indigo-600 text-white px-4 py-2 rounded">บันทึก</button>
            </div>
        </div>

    </main>

    <div id="edit-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
        <div class="bg-white p-6 rounded-lg w-96 shadow-xl">
            <h3 class="text-lg font-bold mb-4">แก้ไข: <span id="m-email" class="text-indigo-600"></span></h3>
            <input type="hidden" id="m-uid">
            
            <label class="block text-xs font-bold text-gray-500 uppercase">เติม/ลด เครดิต</label>
            <input type="number" id="m-bal" class="w-full border p-2 rounded mb-4 mt-1">
            
            <label class="block text-xs font-bold text-gray-500 uppercase">ล็อคผลการเล่น</label>
            <select id="m-lock" class="w-full border p-2 rounded mb-6 mt-1 bg-gray-50">
                <option value="normal">🎲 สุ่มตามดวง</option>
                <option value="win">✅ บังคับชนะ (ได้ป๊อก 9)</option>
                <option value="lose">❌ บังคับแพ้ (เจ้ากิน)</option>
            </select>
            
            <div class="flex gap-2">
                <button onclick="saveUser()" class="flex-1 bg-black text-white py-2 rounded">บันทึก</button>
                <button onclick="document.getElementById('edit-modal').classList.add('hidden')" class="flex-1 bg-gray-200 py-2 rounded">ปิด</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        const config = {
            apiKey: "AIzaSyABuBrdprpiN32ZD4cSCiSslkYbRfnWGgE",
            authDomain: "namba-fe57a.firebaseapp.com",
            databaseURL: "https://namba-fe57a-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "namba-fe57a",
            appId: "1:340416568750:web:bb0a58ee618978bc107c3f"
        };
        firebase.initializeApp(config);
        const auth = firebase.auth();
        const db = firebase.database();

        auth.onAuthStateChanged(u => {
            if(u && u.email === 'gaga@gmail.com') { // Check email security client-side + rules
                document.getElementById('login-wall').classList.add('hidden');
                document.getElementById('my-email').innerText = u.email;
                initData();
            } else if (u) {
                alert("ไม่ใช่แอดมิน!");
                auth.signOut();
            } else {
                document.getElementById('login-wall').classList.remove('hidden');
            }
        });

        function adminLogin() {
            auth.signInWithEmailAndPassword(
                document.getElementById('a-email').value,
                document.getElementById('a-pass').value
            ).catch(e => alert(e.message));
        }

        function initData() {
            // USERS
            db.ref('users').on('value', s => {
                const tr = document.getElementById('user-rows');
                tr.innerHTML = '';
                s.forEach(c => {
                    const u = c.val();
                    const k = c.key;
                    let lockBadge = `<span class="px-2 py-1 rounded text-xs bg-gray-200">Normal</span>`;
                    if(u.lock_result === 'win') lockBadge = `<span class="px-2 py-1 rounded text-xs bg-green-100 text-green-800 font-bold">Lock WIN</span>`;
                    if(u.lock_result === 'lose') lockBadge = `<span class="px-2 py-1 rounded text-xs bg-red-100 text-red-800 font-bold">Lock LOSE</span>`;
                    
                    tr.innerHTML += `
                        <tr class="border-b hover:bg-gray-50">
                            <td class="p-4">${u.email}</td>
                            <td class="p-4 font-mono font-bold text-indigo-600">฿${(u.balance||0).toLocaleString()}</td>
                            <td class="p-4">${lockBadge}</td>
                            <td class="p-4 text-right">
                                <button onclick="openEdit('${k}','${u.email}',${u.balance},'${u.lock_result}')" class="bg-black text-white px-3 py-1 rounded text-sm hover:bg-gray-800">จัดการ</button>
                            </td>
                        </tr>
                    `;
                });
            });

            // FINANCE
            db.ref('transactions').orderByChild('status').equalTo('pending').on('value', s => {
                const div = document.getElementById('txn-rows');
                div.innerHTML = '';
                if(!s.exists()) div.innerHTML = `<div class="p-4 text-gray-400">ไม่มีรายการค้าง</div>`;
                
                s.forEach(c => {
                    const t = c.val();
                    const k = c.key;
                    const isDep = t.type==='deposit';
                    div.innerHTML += `
                        <div class="bg-white p-4 rounded shadow border-l-4 ${isDep?'border-green-500':'border-red-500'} flex justify-between items-center">
                            <div>
                                <div class="font-bold text-lg">${isDep?'แจ้งฝาก':'แจ้งถอน'} ฿${t.amount.toLocaleString()}</div>
                                <div class="text-sm text-gray-500">${t.email} | ${t.details}</div>
                                <div class="text-xs text-gray-400">${new Date(t.timestamp).toLocaleString()}</div>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="doTxn('${k}','${t.uid}',${t.amount},'${t.type}',true)" class="bg-green-600 text-white px-3 py-1 rounded hover:bg-green-700">อนุมัติ</button>
                                <button onclick="doTxn('${k}','${t.uid}',${t.amount},'${t.type}',false)" class="bg-red-600 text-white px-3 py-1 rounded hover:bg-red-700">ยกเลิก</button>
                            </div>
                        </div>
                    `;
                });
            });

            // SETTINGS
            db.ref('system').once('value', s => {
                const d = s.val() || {};
                document.getElementById('s-announce').value = d.announcement || '';
                document.getElementById('s-line').value = d.contact_line || '';
                document.getElementById('s-bank').value = d.bank_info || '';
            });
        }

        // ACTIONS
        function setTab(t) {
            ['users','finance','settings'].forEach(x => document.getElementById('tab-'+x).classList.add('hidden'));
            document.getElementById('tab-'+t).classList.remove('hidden');
        }

        function openEdit(uid, email, bal, lock) {
            document.getElementById('m-uid').value = uid;
            document.getElementById('m-email').innerText = email;
            document.getElementById('m-bal').value = bal;
            document.getElementById('m-lock').value = lock || 'normal';
            document.getElementById('edit-modal').classList.remove('hidden');
            document.getElementById('edit-modal').classList.add('flex');
        }

        function saveUser() {
            const uid = document.getElementById('m-uid').value;
            db.ref('users/'+uid).update({
                balance: parseInt(document.getElementById('m-bal').value),
                lock_result: document.getElementById('m-lock').value
            });
            document.getElementById('edit-modal').classList.add('hidden');
            document.getElementById('edit-modal').classList.remove('flex');
        }

        function doTxn(key, uid, amt, type, approve) {
            if(!confirm(approve ? 'ยืนยันอนุมัติ?' : 'ยืนยันยกเลิก?')) return;
            
            const updates = {};
            updates[`transactions/${key}/status`] = approve ? 'approved' : 'rejected';
            
            if(approve && type === 'deposit') {
                db.ref(`users/${uid}/balance`).transaction(c => (c||0) + amt);
            }
            if(!approve && type === 'withdraw') { // Refund if rejected withdrawal
                db.ref(`users/${uid}/balance`).transaction(c => (c||0) + amt);
            }
            
            db.ref().update(updates);
        }

        function saveSys() {
            db.ref('system').set({
                announcement: document.getElementById('s-announce').value,
                contact_line: document.getElementById('s-line').value,
                bank_info: document.getElementById('s-bank').value
            });
            alert("บันทึกแล้ว");
        }
    </script>
</body>
</html>
